# Root-level compose file so you can run from the repo root with no -f flag:
#
#   docker compose up --build         # build and run in foreground
#   docker compose up -d --build      # detached
#   docker compose logs -f             # tail logs
#   docker compose down                # stop
#
# This brings up THREE services:
#   - neo4j        — Neo4j Community 5.26 with APOC, ports 7474/7687 on localhost
#   - neo4j-init   — one-shot container that applies phases/cypher/schema.cypher
#   - sparengine   — the orchestrator on :2001 that spawns the audit agent
#
# The detailed-comment version of this same configuration is at
# sparengine-export/docker-compose.yml (with build context = sparengine-export/).

services:
  sparengine:
    build:
      context: .
      dockerfile: sparengine-export/Dockerfile
    image: sparengine-export:latest
    container_name: sparengine
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
      neo4j-init:
        condition: service_completed_successfully
    ports:
      - "2001:2001"
    environment:
      CLAUDE_CODE_USE_GEMINI:    "${CLAUDE_CODE_USE_GEMINI}"
      GEMINI_API_KEY:            "${GEMINI_API_KEY}"
      GEMINI_MODEL:              "${GEMINI_MODEL:-gemini-3.1-pro-preview}"
      SUPABASE_URL:              "${SUPABASE_URL}"
      SUPABASE_SERVICE_ROLE_KEY: "${SUPABASE_SERVICE_ROLE_KEY}"
      PORT:                      "2001"
      EXPORT_PAGE_SIZE:          "${EXPORT_PAGE_SIZE:-1000}"
      AGENT_CLI:                 "${AGENT_CLI:-openclaude}"
      ANTHROPIC_API_KEY:         "${ANTHROPIC_API_KEY:-}"

      # Neo4j connection (replaces the per-asset SQLite graph.db). The phase
      # scripts read these via the `neo4j` Python driver; bolt://neo4j:7687
      # resolves to the sibling container on this docker network.
      NEO4J_URI:       "${NEO4J_URI:-bolt://neo4j:7687}"
      NEO4J_USER:      "${NEO4J_USER:-neo4j}"
      NEO4J_PASSWORD:  "${NEO4J_PASSWORD}"
      NEO4J_DATABASE:  "${NEO4J_DATABASE:-neo4j}"
    volumes:
      - sparengine-csvs:/app/csvs
      # Read-only shared mount of the neo4j-import volume so Phase 10 can
      # sanitise the restore.cypher APOC writes there.
      - neo4j-import:/app/neo4j-import
      # Uncomment ONLY if AGENT_CLI=claude (Pro/Max OAuth needs to persist).
      # - claude-auth:/home/node/.claude
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:2001/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  neo4j:
    image: neo4j:5.26-community
    container_name: sparengine-neo4j
    restart: unless-stopped
    ports:
      # Bind to 127.0.0.1 only — local dev access; sparengine reaches neo4j
      # internally via bolt://neo4j:7687.
      - "127.0.0.1:7474:7474"   # HTTP / Neo4j Browser
      - "127.0.0.1:7687:7687"   # Bolt (driver protocol)
    environment:
      NEO4J_AUTH:           "neo4j/${NEO4J_PASSWORD}"
      # Plain copy of the password so the in-container healthcheck shell can
      # read it. NOT prefixed with NEO4J_ because Neo4j parses every NEO4J_*
      # var as a config setting and would fail strict validation.
      HEALTHCHECK_PASSWORD: "${NEO4J_PASSWORD}"

      # APOC plugin for restore.cypher exports + dynamic-label MERGE helpers.
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_security_procedures_allowlist:    "apoc.*"
      NEO4J_apoc_export_file_enabled:  "true"
      NEO4J_apoc_import_file_enabled:  "true"
      NEO4J_apoc_import_file_use__neo4j__config: "true"

      # Memory tuning — defaults are conservative; bump if you hit 100k+ nodes.
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size:     "1g"
      NEO4J_server_memory_pagecache_size:     "512m"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
      - neo4j-import:/import
      - neo4j-plugins:/plugins
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p \"$$HEALTHCHECK_PASSWORD\" 'RETURN 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  neo4j-init:
    # One-shot init container. Runs after neo4j is healthy, applies
    # phases/cypher/schema.cypher (idempotent), chowns /import so APOC exports
    # can write later, then exits. Sparengine waits on this completing.
    image: neo4j:5.26-community
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - neo4j-import:/import
      - ./sparengine-export/phases/cypher:/sparengine-cypher:ro
    environment:
      HEALTHCHECK_PASSWORD: "${NEO4J_PASSWORD}"
    user: "0"
    entrypoint:
      - sh
      - -c
      - |
        set -e
        cp /sparengine-cypher/schema.cypher  /import/schema.cypher
        cp /sparengine-cypher/captions.cypher /import/captions.cypher
        chown -R 7474:7474 /import
        cypher-shell -a bolt://neo4j:7687 -u neo4j -p "$$HEALTHCHECK_PASSWORD" \
            -f /import/schema.cypher
        echo "neo4j-init: schema.cypher applied"
    restart: "no"

volumes:
  sparengine-csvs:
  neo4j-data:
  neo4j-logs:
  neo4j-import:
  neo4j-plugins:
  # claude-auth:    # uncomment together with the mount above
