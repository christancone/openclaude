[pytest]
# Test discovery rooted at sparengine-export/tests/. Run with:
#   docker compose exec sparengine bash -c 'cd /app/sparengine-export && pytest'
# or from a host venv that has neo4j + pandas + the rest of requirements.txt.

testpaths       = .
python_files    = test_*.py
python_classes  = Test*
python_functions = test_*

# Strict markers — typo'd marker names fail loudly instead of being silently
# ignored. Every marker the suite uses is registered below.
addopts = -ra --strict-markers --tb=short

markers =
    no_neo4j:    test does NOT touch Neo4j (skips the asset cleanup fixture)
    unit:        unit test (<100ms, no Neo4j)
    lint:        static-rule check over briefs / DAL / schema (no Neo4j)
    integration: integration test (uses Neo4j + synthetic CSV)
    regression:  full-pipeline regression on a real-archetype CSV (slow, minutes)
    slow:        any test that takes > 5 seconds
