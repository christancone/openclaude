services:
  sparengine:
    build:
      # Build context is the repo root, not sparengine-export/, because the
      # Dockerfile needs OpenClaude's package.json + src/ to bundle dist/cli.mjs.
      context: ..
      dockerfile: sparengine-export/Dockerfile
    image: sparengine-export:latest
    container_name: sparengine
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "2001:2001"
    environment:
      # Provider config — pulled from the .env file in the repo root.
      CLAUDE_CODE_USE_GEMINI: "${CLAUDE_CODE_USE_GEMINI}"
      GEMINI_API_KEY:         "${GEMINI_API_KEY}"
      GEMINI_MODEL:           "${GEMINI_MODEL:-gemini-3.1-pro-preview}"

      # Supabase (CSV export).
      SUPABASE_URL:               "${SUPABASE_URL}"
      SUPABASE_SERVICE_ROLE_KEY:  "${SUPABASE_SERVICE_ROLE_KEY}"

      # Server tuning.
      PORT:             "2001"
      EXPORT_PAGE_SIZE: "${EXPORT_PAGE_SIZE:-1000}"

      # Agent backend: openclaude (default) or claude (uses Claude Code subscription).
      # Set ANTHROPIC_API_KEY too if you want non-interactive Claude Code auth.
      AGENT_CLI:           "${AGENT_CLI:-openclaude}"
      ANTHROPIC_API_KEY:   "${ANTHROPIC_API_KEY:-}"

      # Neo4j connection (replaces the per-asset SQLite graph.db). The phase
      # scripts open a Bolt session via the official `neo4j` Python driver.
      # Hostname `neo4j` resolves to the sibling service on the docker network.
      NEO4J_URI:       "${NEO4J_URI:-bolt://neo4j:7687}"
      NEO4J_USER:      "${NEO4J_USER:-neo4j}"
      NEO4J_PASSWORD:  "${NEO4J_PASSWORD}"
      NEO4J_DATABASE:  "${NEO4J_DATABASE:-neo4j}"
    volumes:
      # Per-asset artefacts (CSV + graph_export.json + restore.cypher
      # + asset_graph.html + tier_views.cypher). This volume is the source
      # of truth for finalised dossiers — sacred. The neo4j-data volume
      # is replaceable via `restore.cypher` replay.
      - sparengine-csvs:/app/csvs

      # Read-only shared mount of the neo4j-import volume so Phase 10's
      # post-export sanitiser (graph_dal.export.sanitize_restore_cypher_inplace)
      # can edit the restore.cypher file APOC just wrote, before copying
      # it into the asset workdir.
      - neo4j-import:/app/neo4j-import

      # Claude Code OAuth cache. Mount only when AGENT_CLI=claude (Pro/Max
      # subscription auth needs to survive restarts). For AGENT_CLI=openclaude
      # (default), leave this commented — no auth state to save, and the
      # named-volume mount caused EACCES on /home/node/.claude/session-env
      # because Docker creates fresh volumes as root. The Dockerfile now
      # pre-creates /home/node/.claude with node ownership so when you DO
      # uncomment this, the volume inherits node:node correctly.
      # - claude-auth:/home/node/.claude
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:2001/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  neo4j:
    # Community Edition is sufficient for our scale (single shared DB,
    # multi-tenancy via `asset_id` property tags). Pinned to 5.26 LTS.
    image: neo4j:5.26-community
    container_name: sparengine-neo4j
    restart: unless-stopped
    ports:
      # Bind to 127.0.0.1 only — Bolt and Browser are exposed for local dev,
      # not the wider network. Sparengine reaches Neo4j via the docker network
      # using `bolt://neo4j:7687` (no host port needed for that path).
      - "127.0.0.1:7474:7474"   # HTTP / Neo4j Browser
      - "127.0.0.1:7687:7687"   # Bolt (driver protocol)
    environment:
      # Initial password set on first start. Subsequent starts keep the
      # existing /data state. Change via `neo4j-admin dbms set-initial-password`
      # if needed before first start.
      NEO4J_AUTH:           "neo4j/${NEO4J_PASSWORD}"
      # Plain copy of the password so the in-container healthcheck shell can
      # read it. NOT prefixed with NEO4J_ because the Neo4j entrypoint parses
      # every NEO4J_* env var as a config setting and strict validation fails
      # on an unknown setting named "password".
      HEALTHCHECK_PASSWORD: "${NEO4J_PASSWORD}"

      # APOC plugin: needed for apoc.export.cypher.query (per-asset Cypher
      # dumps for the `restore.cypher` deliverable in Phase 10) plus batched
      # MERGE helpers and date utilities used by the DAL.
      NEO4J_PLUGINS: '["apoc"]'

      # APOC procedures need to be explicitly unrestricted to run.
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_security_procedures_allowlist:    "apoc.*"

      # APOC export to filesystem (writes `restore.cypher` into /import).
      NEO4J_apoc_export_file_enabled:  "true"
      NEO4J_apoc_import_file_enabled:  "true"
      NEO4J_apoc_import_file_use__neo4j__config: "true"

      # Memory tuning: defaults are conservative; bump these if you ever hit
      # a 100k+ node dossier. Today's AW139 sample is ~1k pages, ~12 MB.
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size:     "1g"
      NEO4J_server_memory_pagecache_size:     "512m"
    volumes:
      - neo4j-data:/data         # the graph itself — persist across restarts
      - neo4j-logs:/logs
      - neo4j-import:/import     # apoc.export.cypher writes per-asset dumps here
      - neo4j-plugins:/plugins   # APOC jar; persisted so re-pulls don't re-download
    healthcheck:
      # Bolt-level health: the driver is ready and the default DB accepts
      # a query. cypher-shell ships in the official image. The $$ escapes
      # docker-compose's variable expansion so the inner shell sees the
      # literal $NEO4J_PASSWORD env var inside the container.
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p \"$$HEALTHCHECK_PASSWORD\" 'RETURN 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

volumes:
  sparengine-csvs:
  neo4j-data:
  neo4j-logs:
  neo4j-import:
  neo4j-plugins:
  # claude-auth:    # uncomment together with the mount above
